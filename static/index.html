<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NetShare</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0d1218">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NetShare">
  <style>
:root {
  --bg: #0a0d14; --bg2: #0e121b; --panel: #131826; --panel2: #1a2032;
  --line: #232b3d; --line2: #2d3852;
  --txt: #e8ecf3; --muted: #7e889c; --muted2: #5b6478;
  --accent: #2680ff;            /* UniFi blue */
  --down: #2680ff; --up: #25c685;
  --ok: #25c685; --warn: #f5a623; --bad: #ff5a6a;
  --shadow: 0 10px 40px #0006;
}
* { box-sizing: border-box; }
html, body { margin: 0; }
body {
  background:
    radial-gradient(1200px 500px at 80% -10%, #16224033, transparent),
    var(--bg);
  color: var(--txt);
  font: 14px/1.5 -apple-system, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}

/* ---- topbar ---- */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; background: #0c0f17cc; backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 20;
}
.brand { display: flex; align-items: center; gap: 12px; }
.logo {
  width: 38px; height: 38px; display: grid; place-items: center; font-size: 20px;
  background: linear-gradient(135deg, var(--accent), #6f4bff);
  border-radius: 10px; color: #fff; box-shadow: 0 4px 14px #2680ff55;
}
.brand-name { font-weight: 700; font-size: 16px; letter-spacing: .2px; }
.brand-sub { font-size: 12px; color: var(--muted); }
.conn-pill {
  display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
  padding: 7px 14px; border-radius: 30px; background: var(--panel);
  border: 1px solid var(--line); color: var(--muted);
}
.conn-pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted2); }
.conn-pill.ok { color: var(--ok); border-color: #25c68544; } .conn-pill.ok .dot { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
.conn-pill.warn { color: var(--warn); border-color: #f5a62344; } .conn-pill.warn .dot { background: var(--warn); }
.conn-pill.bad { color: var(--bad); border-color: #ff5a6a44; } .conn-pill.bad .dot { background: var(--bad); }

main { max-width: 1040px; margin: 0 auto; padding: 24px; }
section { margin-bottom: 28px; }
.section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
h2 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
h2 small { color: var(--muted); font-weight: 400; }

/* ---- buttons / inputs ---- */
button {
  background: var(--accent); color: #fff; border: 0; border-radius: 9px;
  padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: filter .15s, background .15s;
}
button:hover { filter: brightness(1.12); }
button.ghost { background: var(--panel); color: var(--txt); border: 1px solid var(--line2); }
button.ghost:hover { background: var(--panel2); filter: none; }
select, input {
  background: var(--panel2); color: var(--txt); border: 1px solid var(--line2);
  border-radius: 9px; padding: 9px 11px; font-size: 13px; width: 100%;
  outline: none; transition: border-color .15s;
}
select:focus, input:focus { border-color: var(--accent); }

/* ---- HERO ---- */
.hero {
  display: grid; grid-template-columns: 1fr 1.1fr; gap: 22px;
  background: linear-gradient(180deg, var(--panel), var(--bg2));
  border: 1px solid var(--line); border-radius: 18px; padding: 22px;
  box-shadow: var(--shadow);
}
.hero-info { display: flex; gap: 18px; }
.hero-icon {
  width: 56px; height: 56px; flex: none; display: grid; place-items: center;
  font-size: 26px; border-radius: 14px; background: #2680ff1a; border: 1px solid #2680ff33;
}
.hero-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); font-weight: 700; }
.hero-isp { font-size: 22px; font-weight: 700; margin: 2px 0 14px; }
.hero-rows { display: grid; gap: 7px; }
.hero-rows > div { display: flex; justify-content: space-between; gap: 16px; font-size: 13px; border-bottom: 1px dashed var(--line); padding-bottom: 6px; }
.hero-rows .k { color: var(--muted); }
.hero-rows .v { font-family: ui-monospace, "SF Mono", monospace; color: var(--txt); text-align: right; }

.hero-graph { display: flex; flex-direction: column; }
.rates { display: flex; gap: 24px; margin-bottom: 6px; }
.rate { display: flex; align-items: baseline; gap: 6px; font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
.rate small { font-size: 12px; font-weight: 600; color: var(--muted); }
.rate .arrow { font-size: 18px; }
.rate.down .arrow, .rate.down { color: var(--down); }
.rate.up .arrow, .rate.up { color: var(--up); }
.graph { width: 100%; flex: 1; display: block; }

/* ---- interface grid ---- */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card {
  background: linear-gradient(180deg, var(--panel), var(--bg2));
  border: 1px solid var(--line); border-radius: 16px; padding: 16px; position: relative;
  transition: border-color .15s, transform .15s;
}
.card:hover { border-color: var(--line2); }
.card.role-wan { border-color: #2680ff55; }
.card.role-share { border-color: #25c68555; }
.card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.ico { width: 34px; height: 34px; flex: none; display: grid; place-items: center; border-radius: 9px; font-size: 16px; background: var(--panel2); }
.ico.wifi { background: #2680ff1a; } .ico.eth { background: #25c6851a; }
.card-name { font-weight: 700; font-family: ui-monospace, monospace; font-size: 14px; }
.card-sub { font-size: 11px; color: var(--muted); }
.pill {
  margin-left: auto; font-size: 10px; font-weight: 700; letter-spacing: .5px;
  padding: 3px 9px; border-radius: 20px; text-transform: uppercase;
}
.pill.up { background: #25c68522; color: var(--ok); }
.pill.down { background: #ff5a6a22; color: var(--bad); }

.kv { display: flex; justify-content: space-between; font-size: 12px; padding: 5px 0; border-bottom: 1px dashed var(--line); }
.kv .k { color: var(--muted); } .kv .v { font-family: ui-monospace, monospace; }
.kv .v.role-tag { font-weight: 700; }
.role-tag.wan { color: var(--down); } .role-tag.share { color: var(--up); }
.role-tag.lan { color: var(--warn); } .role-tag.none { color: var(--muted); }

.mini { display: flex; align-items: center; gap: 14px; margin: 12px 0 8px; }
.mini .m { display: flex; align-items: baseline; gap: 4px; font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.mini .m small { font-size: 10px; color: var(--muted); font-weight: 600; }
.mini .m.down { color: var(--down); } .mini .m.up { color: var(--up); }
/* pequena pílula à direita com a banda Wi-Fi ou velocidade do link Ethernet */
.mini .m.link-info {
  margin-left: auto;
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  background: rgba(255,255,255,.06);
  border-radius: 999px;
  letter-spacing: .02em;
}
.spark { width: 100%; height: 38px; display: block; }

.card-ctrl { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
.card-ctrl label { flex: 1; font-size: 10px; color: var(--muted); display: flex; flex-direction: column; gap: 4px; text-transform: uppercase; letter-spacing: .5px; }
.card-ctrl .wifi-btn { padding: 9px 12px; font-size: 12px; align-self: flex-end; }

/* ---- wifi list ---- */
.wifi-list { display: flex; flex-direction: column; gap: 8px; }
.wifi-row {
  display: flex; align-items: center; gap: 14px; background: var(--panel);
  border: 1px solid var(--line); border-radius: 12px; padding: 12px 16px;
}
.wifi-row.in-use { border-color: var(--accent); background: #2680ff0f; }
.wifi-row .ssid { font-weight: 600; flex: 1; }
.wifi-row .sec { font-size: 12px; color: var(--muted); }
.wifi-row .connect { padding: 7px 14px; font-size: 12px; }
.signal { font-family: monospace; letter-spacing: -2px; color: var(--line2); font-size: 15px; }
.signal.s4, .signal.s3 { color: var(--ok); }
.signal.s2 { color: var(--warn); } .signal.s1, .signal.s0 { color: var(--bad); }

.muted { color: var(--muted); padding: 12px; } .muted.error { color: var(--bad); }
.hidden { display: none !important; }

/* ---- toast / modal ---- */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--panel2); border: 1px solid var(--line2); color: var(--txt);
  padding: 13px 20px; border-radius: 12px; box-shadow: var(--shadow); z-index: 50;
  font-size: 13px; font-weight: 500;
}
.toast.error { border-color: var(--bad); color: #ffd4d8; }
.modal { position: fixed; inset: 0; background: #000b; display: flex; align-items: center; justify-content: center; z-index: 60; backdrop-filter: blur(3px); }
.modal-box { background: var(--panel); border: 1px solid var(--line2); border-radius: 16px; padding: 24px; width: 340px; box-shadow: var(--shadow); }
.modal-box h3 { margin: 0 0 16px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

@media (max-width: 720px) {
  .hero { grid-template-columns: 1fr; }
}

/* ---- conta / topbar-right ---- */
.topbar-right { display: flex; align-items: center; gap: 12px; }
.acct { position: relative; }
.acct-btn { padding: 7px 12px; font-size: 13px; }
.acct-menu {
  position: absolute; right: 0; top: 110%; background: var(--panel2);
  border: 1px solid var(--line2); border-radius: 10px; padding: 6px;
  min-width: 170px; box-shadow: var(--shadow); z-index: 30;
}
.acct-item {
  display: block; width: 100%; text-align: left; background: transparent;
  color: var(--txt); padding: 9px 12px; border-radius: 7px; font-weight: 500;
}
.acct-item:hover { background: var(--panel); filter: none; }

/* ---- ecra de login / setup ---- */
.auth-screen {
  position: fixed; inset: 0; z-index: 100; display: flex;
  align-items: center; justify-content: center;
  background:
    radial-gradient(900px 500px at 50% -10%, #1d2a4d, transparent),
    var(--bg);
}
.auth-box {
  width: 340px; background: linear-gradient(180deg, var(--panel), var(--bg2));
  border: 1px solid var(--line2); border-radius: 18px; padding: 28px;
  box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 12px;
}
.auth-logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 700; }
.auth-logo .logo { width: 34px; height: 34px; font-size: 18px; }
.auth-title { font-size: 17px; font-weight: 600; margin-top: 6px; }
.auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
.auth-box input { margin-top: 2px; }
.auth-box > button { margin-top: 8px; padding: 11px; font-size: 14px; }
.auth-error { color: var(--bad); font-size: 13px; min-height: 18px; }

/* ---- campo de password com olho ---- */
.pw-wrap { position: relative; display: block; }
.pw-wrap input { padding-right: 40px; }
.pw-eye {
  position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
  background: transparent !important; border: 0; padding: 4px 7px;
  font-size: 15px; cursor: pointer; opacity: .6; filter: none;
}
.pw-eye:hover { opacity: 1; background: transparent !important; }

/* ---- estado "Ligado" na lista Wi-Fi ---- */
.wifi-state { color: var(--ok); font-size: 12px; font-weight: 700; }
.wifi-row .disconnect { padding: 7px 14px; font-size: 12px; color: var(--bad); border-color: #ff5a6a44; }
.wifi-row .disconnect:hover { background: #ff5a6a18; }


/* seletor de idioma no menu de conta */
.acct-divider { height:1px; background:rgba(255,255,255,.08); margin:4px 0; }
.acct-label { padding:6px 12px 2px; font-size:11px; opacity:.55; letter-spacing:.04em; }
.acct-item.lang-opt { display:flex; align-items:center; justify-content:space-between; }
.acct-item.lang-opt .check { opacity:0; }
.acct-item.lang-opt.selected .check { opacity:1; color:#25c685; }

  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◈</span>
      <div>
        <div class="brand-name">NetShare</div>
        <div class="brand-sub">Gateway</div>
      </div>
    </div>
    <div class="topbar-right">
      <div id="conn-pill" class="conn-pill"><span class="dot"></span><span id="conn-text" data-i18n="conn.checking">checking…</span></div>
      <div class="acct" id="acct">
        <button id="acct-btn" class="ghost acct-btn">👤 <span id="acct-name" data-i18n="account.account">account</span> ▾</button>
        <div id="acct-menu" class="acct-menu hidden">
          <button id="acct-chpw" class="acct-item" data-i18n="account.changePassword">Change password</button>
          <button id="acct-logout" class="acct-item" data-i18n="account.logout">Sign out</button>
          <div class="acct-divider"></div>
          <div class="acct-label" data-i18n="account.language">Language</div>
          <button class="acct-item lang-opt" data-lang-opt="pt"><span>Português</span><span class="check">✓</span></button>
          <button class="acct-item lang-opt" data-lang-opt="en"><span>English</span><span class="check">✓</span></button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-info">
        <div class="hero-icon" id="hero-icon">🌐</div>
        <div class="hero-meta">
          <div class="hero-label" data-i18n="hero.label">INTERNET</div>
          <div class="hero-isp" id="hero-isp">—</div>
          <div class="hero-rows">
            <div><span class="k" data-i18n="hero.publicIp">Public IP</span><span class="v" id="hero-ip">—</span></div>
            <div><span class="k" data-i18n="hero.org">Org</span><span class="v" id="hero-org">—</span></div>
            <div><span class="k" data-i18n="hero.location">Location</span><span class="v" id="hero-loc">—</span></div>
            <div><span class="k" data-i18n="hero.wan">WAN</span><span class="v" id="hero-wan">—</span></div>
          </div>
        </div>
      </div>
      <div class="hero-graph">
        <div class="rates">
          <div class="rate down"><span class="arrow">↓</span><span id="hero-down">0</span><small id="hero-down-u">bps</small></div>
          <div class="rate up"><span class="arrow">↑</span><span id="hero-up">0</span><small id="hero-up-u">bps</small></div>
        </div>
        <canvas id="hero-canvas" class="graph" height="120"></canvas>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2 data-i18n="sections.interfaces">Interfaces</h2>
        <button id="refresh" class="ghost" data-i18n="sections.refresh">↻ Refresh</button>
      </div>
      <div id="devices" class="grid"></div>
    </section>

    <section id="wifi-section" class="hidden">
      <div class="section-head">
        <h2><span data-i18n="sections.wifiNetworks">Wi-Fi networks</span> <small id="wifi-dev"></small></h2>
        <button id="scan" class="ghost" data-i18n="sections.scan">⟳ Scan</button>
      </div>
      <div id="wifi-list" class="wifi-list"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modal-ssid"></h3>
      <input id="modal-pass" type="password" data-i18n-ph="wifi.passwordPlaceholder" placeholder="Network password" autocomplete="off">
      <div class="modal-actions">
        <button id="modal-cancel" class="ghost" data-i18n="modal.cancel">Cancel</button>
        <button id="modal-connect" data-i18n="modal.connect">Connect</button>
      </div>
    </div>
  </div>

  <!-- mudar password -->
  <div id="pw-modal" class="modal hidden">
    <div class="modal-box">
      <h3 data-i18n="modal.changePassword">Change password</h3>
      <input id="pw-current" type="password" data-i18n-ph="modal.currentPw" placeholder="Current password" autocomplete="current-password">
      <input id="pw-new" type="password" data-i18n-ph="modal.newPw" placeholder="New password (min. 6)" autocomplete="new-password">
      <input id="pw-new2" type="password" data-i18n-ph="modal.confirmNewPw" placeholder="Confirm new password" autocomplete="new-password">
      <div id="pw-error" class="auth-error"></div>
      <div class="modal-actions">
        <button id="pw-cancel" class="ghost" data-i18n="modal.cancel">Cancel</button>
        <button id="pw-save" data-i18n="modal.save">Save</button>
      </div>
    </div>
  </div>

  <!-- login / 1.o arranque -->
  <div id="auth-screen" class="auth-screen hidden">
    <div class="auth-box">
      <div class="auth-logo"><span class="logo">◈</span> NetShare</div>
      <div id="auth-title" class="auth-title" data-i18n="auth.signIn">Sign in</div>
      <div id="auth-sub" class="auth-sub"></div>
      <input id="auth-user" data-i18n-ph="auth.username" placeholder="Username" autocomplete="username">
      <input id="auth-pass" type="password" data-i18n-ph="auth.password" placeholder="Password" autocomplete="current-password">
      <input id="auth-pass2" type="password" data-i18n-ph="auth.confirmPassword" placeholder="Confirm password" class="hidden" autocomplete="new-password">
      <div id="auth-error" class="auth-error"></div>
      <button id="auth-submit" data-i18n="auth.signInBtn">Sign in</button>
    </div>
  </div>

  <script>

const SUPPORTED_LANGS = ["pt", "en"];
const DEFAULT_LANG = "en";

function detectLang() {
  // 1) escolha do utilizador (localStorage)
  try {
    const saved = localStorage.getItem("netshare_lang");
    if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
  } catch (_) {}
  // 2) browser (ex.: "pt-PT" -> "pt"; "en-US" -> "en")
  const langs = (navigator.languages && navigator.languages.length)
    ? navigator.languages : [navigator.language || ""];
  for (const l of langs) {
    const base = (l || "").toLowerCase().split("-")[0];
    if (SUPPORTED_LANGS.includes(base)) return base;
  }
  // 3) fallback
  return DEFAULT_LANG;
}

let CURRENT_LANG = detectLang();

function t(key, vars) {
  let s = (TRANSLATIONS[CURRENT_LANG] && TRANSLATIONS[CURRENT_LANG][key])
    || TRANSLATIONS[DEFAULT_LANG][key]
    || key;
  if (vars) {
    for (const k in vars) s = s.replaceAll("{" + k + "}", vars[k]);
  }
  return s;
}

function applyI18n(root) {
  const r = root || document;
  r.querySelectorAll("[data-i18n]").forEach((el) => {
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  r.querySelectorAll("[data-i18n-ph]").forEach((el) => {
    el.setAttribute("placeholder", t(el.getAttribute("data-i18n-ph")));
  });
  r.querySelectorAll("[data-i18n-title]").forEach((el) => {
    el.setAttribute("title", t(el.getAttribute("data-i18n-title")));
  });
  // refletir nas zonas dinâmicas
  const lhtml = document.documentElement;
  if (lhtml) lhtml.setAttribute("lang", CURRENT_LANG);
  refreshDynamicI18n();
}

function refreshDynamicI18n() {
  // textos que dependem do estado atual e foram inseridos por JS
  const c = document.getElementById("conn-text");
  if (c && c.dataset.connKey) c.textContent = t(c.dataset.connKey);
  if (devicesMeta && devicesMeta.length) renderDevices();
  updateHeroMeta();
  // sub-título: se não estiver em demo, deixa o hostname
  const sub = document.querySelector(".brand-sub");
  if (sub && sub.dataset.demo === "1") sub.textContent = t("hero.demoMode");
  // se o ecrã de auth estiver aberto, repinta-o
  if (!document.getElementById("auth-screen").classList.contains("hidden")) {
    showAuth(authMode);
  }
}

function setLang(lang) {
  if (!SUPPORTED_LANGS.includes(lang)) return;
  CURRENT_LANG = lang;
  try { localStorage.setItem("netshare_lang", lang); } catch (_) {}
  // atualizar o "✓" no seletor
  document.querySelectorAll("[data-lang-opt]").forEach((el) => {
    el.classList.toggle("selected", el.dataset.langOpt === lang);
  });
  applyI18n();
}

    { id: "share", label: t("role.share") },

let demoMode = false;
let demoT = 0;
const DEMO_DEVICES = [
  { device: "wlan0", type: "wifi", state: "connected", connection: "netshare-wan", role: "wan", ipv4: "192.168.1.42/24", band: "5 GHz" },
  { device: "eth0", type: "ethernet", state: "connected", connection: "netshare-share", role: "share", ipv4: "10.42.0.1/24", link_speed: "1 Gbps" },
  { device: "eth1", type: "ethernet", state: "connected", connection: "netshare-lan", role: "lan", ipv4: "10.10.0.55/16", link_speed: "1 Gbps" },
];
function enterDemo() {
  if (demoMode) return;
  demoMode = true;
  toast(t("demo.activated"));
}
function demoTick() {
  demoT += 0.4;
  const wave = (amp, base, off) => Math.max(0,
    base + amp * (Math.sin(demoT + off) + 0.4 * Math.sin(demoT * 2.3 + off))
    + (Math.random() - 0.5) * amp * 0.4);
  const gen = {
    wlan0: { down: wave(3e6, 6e6, 0), up: wave(6e5, 1.2e6, 1) },
    eth0: { down: wave(6e5, 1.2e6, 2), up: wave(3e6, 6e6, 3) },
    eth1: { down: wave(2e5, 4e5, 4), up: wave(2e5, 4e5, 5) },
  };
  for (const [dev, r] of Object.entries(gen)) {
    rates[dev] = { down: r.down, up: r.up, speed: 1000 };
    pushHistory(dev, r.down, r.up);
  }
  paintRates(); paintHero();
}

// ---------------------------------------------------------------- helpers
async function api(path, opts) {
  const res = await fetch(path, opts);
  const data = await res.json().catch(() => ({}));
  if (res.status === 401 && !demoMode) {
    // sessao expirou -> voltar ao login
    showAuth("login", t("auth.sessionExpired"));
  }
  if (!res.ok) throw new Error(data.error || res.statusText);
  return data;
}

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  })[ch]);
}

function toast(msg, isError) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (isError ? " error" : "");
  setTimeout(() => el.classList.add("hidden"), 3500);
}

function fmtRate(bytesPerSec) {
  const bits = bytesPerSec * 8;
  const units = ["bps", "Kbps", "Mbps", "Gbps"];
  let v = bits, i = 0;
  while (v >= 1000 && i < units.length - 1) { v /= 1000; i++; }
  const num = v >= 100 || i === 0 ? Math.round(v) : v.toFixed(1);
  return [num, units[i]];
}

function pushHistory(dev, down, up) {
  if (!history[dev]) history[dev] = [];
  const h = history[dev];
  h.push({ down, up });
  if (h.length > HIST) h.shift();
}

// ---------------------------------------------------------------- canvas
function drawGraph(canvas, data, opts = {}) {
  if (!canvas || !data) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth, h = canvas.clientHeight || canvas.height;
  if (w === 0) return;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const maxV = Math.max(
    1,
    ...data.map((d) => Math.max(d.down, d.up))
  ) * 1.2;
  const n = Math.max(data.length, 2);
  const step = w / (HIST - 1);
  const x0 = w - (n - 1) * step;

  const series = [
    { key: "down", color: opts.downColor || "#2680ff" },
    { key: "up", color: opts.upColor || "#25c685" },
  ];
  for (const s of series) {
    ctx.beginPath();
    data.forEach((d, i) => {
      const x = x0 + i * step;
      const y = h - (d[s.key] / maxV) * (h - 4) - 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    // area fill
    ctx.lineTo(x0 + (n - 1) * step, h);
    ctx.lineTo(x0, h);
    ctx.closePath();
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, s.color + "55");
    grad.addColorStop(1, s.color + "00");
    ctx.fillStyle = grad; ctx.fill();
    // line
    ctx.beginPath();
    data.forEach((d, i) => {
      const x = x0 + i * step;
      const y = h - (d[s.key] / maxV) * (h - 4) - 2;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = s.color; ctx.lineWidth = 1.6; ctx.stroke();
  }
}

function setConn(connectivity) {
  const map = {
    full: ["ok", "conn.full"],
    limited: ["warn", "conn.limited"],
    portal: ["warn", "conn.portal"],
    none: ["bad", "conn.none"],
    unknown: ["", "conn.unknown"],

  document.getElementById("conn-pill").className = "conn-pill " + cls;
  const el = document.getElementById("conn-text");
  el.dataset.connKey = key;
  el.textContent = t(key);
}

    const data = await api("/api/status");
    setConn(data.connectivity);
    const sub = document.querySelector(".brand-sub");
    sub.dataset.demo = "0";
    sub.textContent = data.hostname || t("hero.gateway");

    renderDevices();

    enterDemo();

    sub.dataset.demo = "1";
    sub.textContent = t("hero.demoMode");

// (100 Mbps / 1 Gbps / 2.5 Gbps / ...). Em modo demo usa valores fictícios.
function linkInfoSpan(dev) {
  let txt = "";
  if (dev.type === "wifi") {
    txt = dev.band || (demoMode ? "5 GHz" : "");
  } else if (dev.type === "ethernet") {
    txt = dev.link_speed || (demoMode ? "1 Gbps" : "");
  }
  if (!txt) return "";
  return `<div class="m link-info" title="${esc(txt)}">${esc(txt)}</div>`;
}

function deviceCard(dev) {
  const isWifi = dev.type === "wifi";
  const card = document.createElement("div");
  card.className = "card role-" + dev.role;
  card.dataset.dev = dev.device;
  const up = dev.state === "connected";
  // Wi-Fi só pode partilhar se o driver expõe modo AP (Broadcom wl fica false).
  const shareBlocked = isWifi && dev.ap_capable === false;
  const opts = rolesList().map((r) => {
    const block = r.id === "share" && shareBlocked;
    return `<option value="${r.id}" ${dev.role === r.id ? "selected" : ""}` +
      `${block ? " disabled" : ""}>${esc(r.label)}` +
      `${block ? " (" + esc(t("role.noAp")) + ")" : ""}</option>`;
  }).join("");

  card.innerHTML = `
    <div class="card-top">
      <div class="ico ${isWifi ? "wifi" : "eth"}">${isWifi ? "📶" : "🔌"}</div>
      <div>
        <div class="card-name">${esc(dev.device)}</div>
        <div class="card-sub">${isWifi ? "Wi-Fi" : "Ethernet"}${dev.connection ? " · " + esc(dev.connection) : ""}</div>
      </div>
      <span class="pill ${up ? "up" : "down"}">${up ? t("device.active") : t("device.inactive")}</span>
    </div>
    <div class="kv"><span class="k">${esc(t("device.ipv4"))}</span><span class="v">${esc(dev.ipv4 || "—")}</span></div>
    <div class="kv"><span class="k">${esc(t("device.role"))}</span><span class="v role-tag ${esc(dev.role)}">${esc(ROLE_TAG[dev.role] || "—")}</span></div>
    <div class="mini">
      <div class="m down"><span>↓</span><span class="r-down">0</span><small class="u-down">bps</small></div>
      <div class="m up"><span>↑</span><span class="r-up">0</span><small class="u-up">bps</small></div>
      ${linkInfoSpan(dev)}
    </div>
    <canvas class="spark"></canvas>
    <div class="card-ctrl">
      <label>${esc(t("device.role"))}
        <select data-dev="${esc(dev.device)}" data-type="${esc(dev.type)}">${opts}</select>
      </label>
      ${isWifi ? `<button class="ghost wifi-btn">${esc(t("device.wifiBtn"))}</button>` : ""}
    </div>`;

  card.querySelector("select").addEventListener("change", (e) => onRoleChange(e.target));
  const wb = card.querySelector(".wifi-btn");
  if (wb) wb.addEventListener("click", () => openWifi(dev.device));
  return card;
}

function renderDevices() {
  const box = document.getElementById("devices");

}

// ---------------------------------------------------------------- throughput
async function refreshThroughput() {
  if (demoMode) { demoTick(); return; }
  let tp;
  try { tp = await api("/api/throughput"); } catch { return; }
  if (lastTp) {
    const dt = tp.ts - lastTp.ts;
    if (dt > 0) {
      for (const [dev, cur] of Object.entries(tp.devices)) {
        const prev = lastTp.devices[dev];
        if (!prev) continue;
        const down = Math.max(0, (cur.rx - prev.rx) / dt);
        const up = Math.max(0, (cur.tx - prev.tx) / dt);
        rates[dev] = { down, up, speed: cur.speed };
        pushHistory(dev, down, up);
      }
    }
  }
  lastTp = tp;
  paintRates();
  paintHero();
}

function paintRates() {
  document.querySelectorAll(".card").forEach((card) => {
    const dev = card.dataset.dev;
    const r = rates[dev] || { down: 0, up: 0 };
    const [dn, du] = fmtRate(r.down);
    const [un, uu] = fmtRate(r.up);
    card.querySelector(".r-down").textContent = dn;
    card.querySelector(".u-down").textContent = du;
    card.querySelector(".r-up").textContent = un;
    card.querySelector(".u-up").textContent = uu;
    drawGraph(card.querySelector(".spark"), history[dev] || []);
  });
}

function paintHero() {

  const [un, uu] = fmtRate(r.up);
  document.getElementById("hero-down").textContent = dn;
  document.getElementById("hero-down-u").textContent = du;
  document.getElementById("hero-up").textContent = un;
  document.getElementById("hero-up-u").textContent = uu;
  drawGraph(document.getElementById("hero-canvas"), wan ? (history[wan.device] || []) : []);
}

// ---------------------------------------------------------------- roles
async function onRoleChange(select) {
  const dev = select.dataset.dev, role = select.value;
  if (role === "wan" && select.dataset.type === "wifi") {
    openWifi(dev);
    toast(t("wifi.pickToConnect"));
    return;
  }
  const body = { dev, role };
  if (role === "share" && select.dataset.type === "wifi") {
    const ssid = prompt(t("wifi.shareSsidPrompt"), `NetShare-${dev}`);
    if (!ssid) { refreshStatus(); return; }
    const password = prompt(t("wifi.sharePasswordPrompt"), "");
    if (!password) { refreshStatus(); return; }
    if (password.length < 8) {
      toast(t("wifi.sharePasswordShort"), true);
      refreshStatus();
      return;
    }
    body.ssid = ssid;
    body.password = password;
  }
  try {
    await api("/api/role", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    toast(t("device.appliedRole", { dev }));
    refreshStatus();
  } catch (e) { toast(t("err.prefix") + e.message, true); refreshStatus(); }
}

// ---------------------------------------------------------------- wifi
function openWifi(dev) {
  wifiDev = dev;
  document.getElementById("wifi-section").classList.remove("hidden");
  document.getElementById("wifi-dev").textContent = "· " + dev;
  scanWifi();
  document.getElementById("wifi-section").scrollIntoView({ behavior: "smooth" });
}

async function scanWifi() {
  if (!wifiDev) return;
  const list = document.getElementById("wifi-list");
  list.innerHTML = `<div class="muted">${t("wifi.scanning")}</div>`;
  try {
    const data = await api("/api/wifi/scan?dev=" + encodeURIComponent(wifiDev));
    list.innerHTML = "";
    if (!data.networks.length) { list.innerHTML = `<div class="muted">${t("wifi.noNetworks")}</div>`; return; }
    data.networks.forEach((n) => list.appendChild(wifiRow(n)));
  } catch (e) {
    list.innerHTML = "";
    const err = document.createElement("div");
    err.className = "muted error";
    err.textContent = t("err.prefix") + e.message;
    list.appendChild(err);
  }
}

function wifiRow(net) {
  const row = document.createElement("div");
  row.className = "wifi-row" + (net.in_use ? " in-use" : "");
  const bars = Math.min(4, Math.round(net.signal / 25));
  const locked = net.security && net.security !== "Open";
  const action = net.in_use
    ? `<span class="wifi-state">${t("wifi.connected")}</span><button class="ghost disconnect">${t("wifi.disconnect")}</button>`
    : `<button class="connect">${t("wifi.connect")}</button>`;
  row.innerHTML = `
    <span class="signal s${bars}">▂▄▆█</span>
    <span class="ssid">${esc(net.ssid)}</span>
    <span class="sec">${locked ? "🔒 " + esc(net.security) : esc(t("wifi.open"))}</span>
    ${action}`;
  if (net.in_use) {
    row.querySelector(".disconnect").addEventListener("click", disconnectWifi);
  } else {
    row.querySelector(".connect").addEventListener("click", () =>
      locked ? askPassword(net.ssid) : connect(net.ssid, ""));
  }
  return row;
}

async function disconnectWifi() {
  if (!confirm(t("wifi.confirmDisconnect"))) return;
  toast(t("wifi.disconnecting"));
  try {
    await api("/api/wifi/disconnect", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dev: wifiDev }),
    });
    toast(t("wifi.disconnected"));
    refreshStatus(); scanWifi();
  } catch (e) { toast(t("err.failPrefix") + e.message, true); }
}

let pendingSsid = null;
function askPassword(ssid) {
  pendingSsid = ssid;
  document.getElementById("modal-ssid").textContent = ssid;
  document.getElementById("modal-pass").value = "";
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal-pass").focus();
}
function closeModal() { document.getElementById("modal").classList.add("hidden"); pendingSsid = null; }

async function connect(ssid, password) {
  toast(t("wifi.connecting", { ssid }));
  try {
    await api("/api/wifi/connect", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ dev: wifiDev, ssid, password }),
    });
    toast(t("wifi.connectedToWan", { ssid }));
    refreshStatus(); loadIsp(true);
    setTimeout(scanWifi, 1500);   // atualizar a lista (estado Ligado)
  } catch (e) { toast(t("err.failPrefix") + e.message, true); }
}

// ---------------------------------------------------------------- AUTENTICACAO
let authMode = "login";        // "login" | "setup"
let dashboardStarted = false;

function $(id) { return document.getElementById(id); }

function showAuth(mode, msg) {
  authMode = mode;
  const setup = mode === "setup";
  $("auth-title").textContent = setup ? t("auth.createAccount") : t("auth.signIn");
  $("auth-sub").textContent = setup ? t("auth.firstAccess") : (msg || "");
  $("auth-error").textContent = setup ? "" : (msg || "");
  $("auth-pass2").classList.toggle("hidden", !setup);
  $("auth-submit").textContent = setup ? t("auth.createSignInBtn") : t("auth.signInBtn");
  $("auth-pass").setAttribute("autocomplete", setup ? "new-password" : "current-password");
  $("auth-user").value = ""; $("auth-pass").value = ""; $("auth-pass2").value = "";
  $("auth-screen").classList.remove("hidden");
  $("auth-user").focus();
}

function hideAuth() { $("auth-screen").classList.add("hidden"); }

async function submitAuth() {
  const user = $("auth-user").value.trim();
  const pass = $("auth-pass").value;
  $("auth-error").textContent = "";
  if (!user || !pass) { $("auth-error").textContent = t("auth.fillAll"); return; }
  if (authMode === "setup") {
    if (pass.length < 6) { $("auth-error").textContent = t("auth.minPw"); return; }
    if (pass !== $("auth-pass2").value) { $("auth-error").textContent = t("auth.pwMismatch"); return; }
  }
  try {
    await api("/api/" + (authMode === "setup" ? "setup" : "login"), {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, password: pass }),
    });
    hideAuth();
    $("acct-name").textContent = user;
    startDashboard();
  } catch (e) {
    $("auth-error").textContent = e.message;
  }
}

async function logout() {
  try { await api("/api/logout", { method: "POST" }); } catch {}
  showAuth("login", t("auth.signedOut"));
}

async function changePassword() {
  const cur = $("pw-current").value, nw = $("pw-new").value, nw2 = $("pw-new2").value;
  $("pw-error").textContent = "";
  if (nw.length < 6) { $("pw-error").textContent = t("pw.minNew"); return; }
  if (nw !== nw2) { $("pw-error").textContent = t("pw.newMismatch"); return; }
  try {
    await api("/api/change-password", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ current: cur, new: nw }),
    });
    $("pw-modal").classList.add("hidden");
    toast(t("pw.changed"));
  } catch (e) { $("pw-error").textContent = e.message; }
}

function startDashboard() {
  if (dashboardStarted) return;
  dashboardStarted = true;
  refreshStatus();
  refreshThroughput();
  setInterval(refreshThroughput, 2000);
  setInterval(refreshStatus, 8000);
  setInterval(() => loadIsp(), 300000);
}

async function checkAuth() {
  let me;
  try {
    me = await api("/api/me");
  } catch (e) {
    // sem backend (ex. preview file://) -> modo demonstracao, sem login.
    // Esconder só os itens que dependem de login; manter o seletor de idioma.
    enterDemo();
    hideAuth();
    $("acct-chpw").classList.add("hidden");
    $("acct-logout").classList.add("hidden");
    startDashboard();
    return;
  }
  if (me.setup_needed) return showAuth("setup");
  if (!me.authenticated) return showAuth("login");
  hideAuth();
  $("acct-name").textContent = me.username || t("account.account");
  startDashboard();
}

// olho para ver/ocultar todas as passwords
function addPasswordToggles() {
  document.querySelectorAll('input[type="password"]').forEach((inp) => {
    if (inp.dataset.eye) return;
    inp.dataset.eye = "1";
    const wrap = document.createElement("span");
    wrap.className = "pw-wrap";
    inp.parentNode.insertBefore(wrap, inp);
    wrap.appendChild(inp);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "pw-eye";
    btn.textContent = "👁";
    btn.title = t("pwEye.title");
    btn.addEventListener("click", () => {
      const show = inp.getAttribute("type") === "password";
      inp.setAttribute("type", show ? "text" : "password");
      btn.textContent = show ? "🙈" : "👁";
    });
    wrap.appendChild(btn);
  });
}

// ---------------------------------------------------------------- bind
$("refresh").addEventListener("click", refreshStatus);
$("scan").addEventListener("click", scanWifi);
$("modal-cancel").addEventListener("click", closeModal);
$("modal-connect").addEventListener("click", () => {
  const pw = $("modal-pass").value, ssid = pendingSsid;
  closeModal(); connect(ssid, pw);
});
$("auth-submit").addEventListener("click", submitAuth);
$("auth-pass").addEventListener("keydown", (e) => { if (e.key === "Enter" && authMode === "login") submitAuth(); });
$("auth-pass2").addEventListener("keydown", (e) => { if (e.key === "Enter") submitAuth(); });
$("acct-btn").addEventListener("click", (e) => {
  e.stopPropagation();
  $("acct-menu").classList.toggle("hidden");
});
document.addEventListener("click", () => $("acct-menu").classList.add("hidden"));
$("acct-logout").addEventListener("click", logout);
$("acct-chpw").addEventListener("click", () => {
  $("pw-current").value = ""; $("pw-new").value = ""; $("pw-new2").value = "";
  $("pw-error").textContent = "";
  $("pw-modal").classList.remove("hidden");
});
$("pw-cancel").addEventListener("click", () => $("pw-modal").classList.add("hidden"));
$("pw-save").addEventListener("click", changePassword);
// seletor de idioma (no menu de conta)
document.querySelectorAll("[data-lang-opt]").forEach((el) => {
  el.addEventListener("click", (e) => {
    e.stopPropagation();
    setLang(el.dataset.langOpt);
  });
  if (el.dataset.langOpt === CURRENT_LANG) el.classList.add("selected");
});
window.addEventListener("resize", () => { paintRates(); paintHero(); });

applyI18n();
addPasswordToggles();
checkAuth();

  </script>
